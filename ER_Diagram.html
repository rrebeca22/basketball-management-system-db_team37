
<style>
#erd { padding: 8px 0; }
#erd svg { width: 100%; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#CECBF6' : '#3C3489',
    primaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    tertiaryColor: dark ? '#083650' : '#E6F1FB',
  },
});

const diagram = `erDiagram
  TEAM {
    int team_id PK
    string name
    int wins
    int losses
    int stadium_id FK
  }
  PLAYER {
    int player_id PK
    string name
    string position
    decimal salary
    int contract_years_remaining
    int age
    decimal height_inches
    decimal weight_lbs
    int team_id FK
  }
  COACH {
    int coach_id PK
    string name
    string title
    int age
    decimal salary
    int contract_years_remaining
    int team_id FK
  }
  STADIUM {
    int stadium_id PK
    string naming_rights
    string city
    string state
    int max_capacity
  }
  GAME {
    int game_id PK
    datetime game_datetime
    decimal ticket_price
    int home_team_id FK
    int away_team_id FK
    int stadium_id FK
    int home_score
    int away_score
  }
  PLAYER_STATS {
    int stat_id PK
    int player_id FK
    int game_id FK
    int points
    int rebounds
    int assists
    int steals
    int blocks
    int turnovers
    int field_goals_made
    int field_goals_attempted
    int free_throws_made
    int free_throws_attempted
    int minutes_played
  }

  STADIUM ||--o{ TEAM : "home stadium"
  STADIUM ||--o{ GAME : "hosts"
  TEAM ||--o{ PLAYER : "has"
  TEAM ||--o{ COACH : "employs"
  TEAM ||--o{ GAME : "plays as home"
  TEAM ||--o{ GAME : "plays as away"
  PLAYER ||--o{ PLAYER_STATS : "recorded in"
  GAME ||--o{ PLAYER_STATS : "generates"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
